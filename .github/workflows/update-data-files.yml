name: Update data files and deploy

on:
  schedule:
    # Run every day at 03:00 UTC (adjust as needed)
    - cron: '0 3 * * *'
  # Allow manual trigger from the Actions tab
  workflow_dispatch: {}

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Fetch data files and deploy to GitHub Pages
        env:
          # gh-pages will use this token to push to the gh-pages branch
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run data-files

